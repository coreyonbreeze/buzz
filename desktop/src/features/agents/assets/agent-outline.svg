<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <defs>
    <filter id="white-to-mask" color-interpolation-filters="sRGB">
      <feComponentTransfer>
        <feFuncR type="linear" slope="-6.7" intercept="6.7"/>
        <feFuncG type="linear" slope="-6.7" intercept="6.7"/>
        <feFuncB type="linear" slope="-6.7" intercept="6.7"/>
      </feComponentTransfer>
    </filter>
    <mask id="agent-shape" maskUnits="userSpaceOnUse" x="0" y="0" width="360" height="360" style="mask-type:luminance">
      <image width="360" height="360" filter="url(#white-to-mask)" href="data:image/png;base64,"/>
    </mask>
  </defs>
  <rect width="360" height="360" fill="#D9D9D9" mask="url(#agent-shape)"/>
</svg>
